services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smoothos
      POSTGRES_PASSWORD: smoothos
      POSTGRES_DB: smoothos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smoothos"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://smoothos:smoothos@postgres:5432/smoothos?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-smoothos-production-secret-change-me}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      CRON_SECRET: ${CRON_SECRET:-smoothos-cron-secret}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma db push && npx tsx prisma/seed.ts && node server.js"

volumes:
  pgdata:
  uploads:
