name: CI

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smoothos
          POSTGRES_PASSWORD: smoothos
          POSTGRES_DB: smoothos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm test
      - name: Set up database
        run: npm run db:setup
        env:
          DATABASE_URL: postgresql://smoothos:smoothos@localhost:5432/smoothos?schema=public
      - run: npm run build
        env:
          DATABASE_URL: postgresql://smoothos:smoothos@localhost:5432/smoothos?schema=public
          AUTH_SECRET: ci-test-secret-minimum-32-characters-long
          CRON_SECRET: ci-test-cron-secret
          NEXT_PUBLIC_APP_URL: http://localhost:3000
      - name: Start server and run E2E
        run: |
          npm run start:prod &
          SERVER_PID=$!
          for i in $(seq 1 60); do
            curl -sf http://localhost:3000/api/health > /dev/null && break
            sleep 1
          done
          curl -sf http://localhost:3000/api/health
          npm run e2e
          kill $SERVER_PID
        env:
          DATABASE_URL: postgresql://smoothos:smoothos@localhost:5432/smoothos?schema=public
          AUTH_SECRET: ci-test-secret-minimum-32-characters-long
          CRON_SECRET: ci-test-cron-secret
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          E2E_BASE_URL: http://localhost:3000
